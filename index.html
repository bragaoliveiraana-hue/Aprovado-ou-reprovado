<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Situação do Aluno</title>
</head>

<body>

<h1>Verificar Situação do Aluno</h1>

<label>Digite a nota:</label>
<input type="number" id="nota" step="0.1"><br><br>

<button onclick="verificar()">Verificar</button>

<h3 id="resultado"></h3>

<script>

function verificar() {

    let nota = Number(document.getElementById("nota").value);

    let resultado = document.getElementById("resultado");

    if (nota >= 6) {
        resultado.innerHTML = "Aluno APROVADO";
    }
    else if (nota >= 4 && nota < 6) {
        resultado.innerHTML = "Aluno em RECUPERAÇÃO";
    }
    else {
        resultado.innerHTML = "Aluno REPROVADO";
    }

}

</script>

</body>
</html>
